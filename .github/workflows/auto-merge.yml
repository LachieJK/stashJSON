name: Auto-merge

# Arms GitHub's native auto-merge on every non-draft PR from this repo, so a PR
# merges itself the moment the required CI check ("Lint, typecheck, and test",
# required by the "Protect main: require CI" ruleset) goes green. Green CI stays
# the only gate: auto-merge cannot merge a PR whose required checks fail.
#
# Fork PRs are deliberately excluded — their GITHUB_TOKEN is read-only, and
# external contributions should still get a human look.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        # `gh pr merge --auto` errors with "Pull request is in clean status" if
        # it runs before the required check has registered on the PR. That is
        # benign and self-heals on the next `synchronize`, so don't fail the run.
        run: gh pr merge --auto --squash "$PR_URL" || true
