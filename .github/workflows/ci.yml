name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest
    env:
      # Throwaway CI database — mirrors what `npm run test` hardcodes.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stashjson_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Start Postgres
        run: docker compose up -d --wait

      - name: Create test database
        run: docker compose exec -T postgres psql -U postgres -d stashjson -c "CREATE DATABASE stashjson_test;"

      - name: Apply migrations to test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Unit + integration tests
        run: npm run test
